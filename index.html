<html lang="zh-Hant">

<title>標會精算器 / Máy Tính Hụi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c1017;--s1:#151d2b;--s2:#1c2638;--bd:#2d3a52;
  --tx:#e4e9f2;--tx2:#7e8da6;
  --ac:#f0b429;--ac2:#fcd34d;
  --grn:#34d399;--red:#f87171;--blu:#60a5fa;--pur:#a78bfa;
}
html{background:var(--bg)}
body{
  font-family:'Noto Sans TC','Noto Sans',sans-serif;
  background:var(--bg);color:var(--tx);
  min-height:100vh;min-height:100dvh;
  padding:16px 12px 60px;
  max-width:500px;margin:0 auto;
  -webkit-text-size-adjust:100%;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input:focus,select:focus{outline:none;border-color:var(--ac)!important}
.card{background:var(--s1);border-radius:14px;border:1px solid var(--bd);padding:16px;margin-bottom:14px}
.card.accent{border-color:var(--ac)}
.card.strategy{border-color:var(--pur)}
.stitle{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--ac)}
.stitle.pur{color:var(--pur)}
.label{font-size:13px;color:var(--tx2);margin-bottom:2px}
.hint{font-size:11px;color:var(--tx2)}
.mono{font-family:'JetBrains Mono',monospace}
.tapbtn{width:48px;height:48px;border-radius:12px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
.tapbtn:active{background:var(--bd)}
.numinput{padding:12px 14px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;text-align:center;width:100%}
.numinput.sm{font-size:15px;padding:10px 8px}
.numinput:disabled{opacity:.3}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.chip{background:var(--s1);border-radius:12px;border:1px solid var(--bd);padding:12px 8px;text-align:center}
.chip .cl{font-size:10px;color:var(--tx2);margin-bottom:4px}
.chip .cv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
thead tr{border-bottom:2px solid var(--bd)}
th{padding:8px 4px;text-align:right;color:var(--tx2);font-weight:500;font-size:10px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
th:first-child{text-align:left}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer}
tbody tr:active,tbody tr.active{background:var(--s2)}
td{padding:12px 4px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
td:first-child{text-align:left;font-family:'Noto Sans TC','Noto Sans',sans-serif;font-weight:700}
.bid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
.bid-label{font-size:11px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.cf-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.cf-bar-col{display:flex;flex-direction:column;align-items:center;min-width:44px;flex:1 0 44px}
.cf-val{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;margin-bottom:3px}
.cf-bar{width:20px;border-radius:4px}
.cf-period{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tx2);margin-top:3px}
.explain{background:var(--s2);border-radius:12px;padding:14px;font-size:11px;color:var(--tx2);line-height:1.9}
.explain strong{color:var(--ac)}
.lang-btn{background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--tx);padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer}
.lang-btn:active{background:var(--bd)}
.save-btn{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center;margin-top:8px}
.save-btn:active{background:var(--bd)}
.save-btn.green{border-color:var(--grn);color:var(--grn)}
.save-btn.red{border-color:var(--red);color:var(--red)}
.record-item{background:var(--s2);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid var(--bd)}
.record-name{font-weight:700;font-size:14px;margin-bottom:4px}
.record-info{font-size:11px;color:var(--tx2);font-family:'JetBrains Mono',monospace}
.record-actions{display:flex;gap:8px;margin-top:8px}
.record-actions button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer}
.record-actions button.del{color:var(--red);border-color:var(--red)}
.name-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:15px;margin-bottom:8px}
.verdict-box{border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.verdict-box.win{background:rgba(52,211,153,.1);border:1px solid var(--grn)}
.verdict-box.lose{background:rgba(248,113,113,.1);border:1px solid var(--red)}
.verdict-box .vt{font-size:18px;font-weight:900;margin-bottom:4px}
.verdict-box .vs{font-size:12px;color:var(--tx2)}
.strat-select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace;appearance:none;-webkit-appearance:none}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--s2);border-radius:12px;padding:4px}
.tab-btn{flex:1;padding:10px 8px;border:none;border-radius:10px;background:transparent;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.tab-btn.active{background:var(--s1);color:var(--ac)}
.compare-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px}
.compare-row:last-child{border-bottom:none}
.compare-label{color:var(--tx2)}
.compare-val{font-family:'JetBrains Mono',monospace;font-weight:700}

<script>
var LANG={zh:{title:"標會精算器",subtitle:"輸入人數、會款、每期標金，自動計算損益與實質利率",settings:"基本設定",members:"會員人數（含會頭）",membersNote:"最少 3 人，無上限",monthlyFee:"每人每月會款",bidsTitle:"每期標金",bidsNote:"第 1 期（會頭）及最後 1 期自動為 0",period:"期",host:"會頭",resultsTitle:"損益總表",colMember:"成員",colPeriod:"得標期",colReceived:"拿到",colPaid:"總繳出",colNet:"淨損益",colMonthly:"月利率",colAnnual:"年化利率",tapHint:"👆 點擊任一行展開逐月明細",cfTitle:"逐月現金流",cfNote:"正值＝收入，負值＝支出",totalPool:"每月總額",duration:"會期總長",months:"個月",maxBid:"最高標金",avgBid:"平均標金",explain:"📖 計算說明",explainText:"外標制：活會繳「會款 − 標金」，死會繳完整會款。得標者當月不繳，收走全部。月利率以 IRR 計算。年化 = (1+月利率)¹² − 1。",langBtn:"🇻🇳 Tiếng Việt",records:"📋 計算紀錄",noRecords:"還沒有紀錄",save:"💾 儲存目前計算",load:"載入",del:"刪除",saveName:"輸入紀錄名稱...",saveConfirm:"確認儲存",cancel:"取消",savedMsg:"✅ 已儲存！",autoSave:"⟳ 自動保存中",
tab1:"📊 標會精算",tab2:"🎯 競標策略",
stratTitle:"🎯 競標策略計算",stratDesc:"計算你該出多少標金，以及跟 0056 定期定額比較",
etfRate:"0056 年化總報酬率 (%)",myPeriod:"我要在第幾期競標",
pastBids:"已知各期標金（上方自動帶入）",futureAvg:"預估未來平均標金",futureAvgAuto:"（自動用過去平均推算）",
breakEven:"最大可出標金",breakEvenDesc:"出超過這個數字就不如等到最後",
scenA:"方案 A：現在標走 + 投 0056",scenB:"方案 B：等到最後一期",
received:"當期拿到",investGrow:"0056 投資終值",deadFees:"死會費用終值",netA:"方案 A 淨值",aliveFees:"活會費用終值",interestSaved:"利息收入終值",finalPot:"最後拿到",netB:"方案 B 淨值",diff:"差額",
verdictWin:"✅ 現在標比較划算！",verdictLose:"⏳ 等到最後比較划算",verdictTip:"差額代表方案 A 比方案 B 多賺（或少賺）的金額",
simTitle:"模擬不同標金",simBid:"標金",simNet:"方案A淨值",simVs:"vs 方案B",simResult:"結果"
},vi:{title:"Máy Tính Hụi",subtitle:"Nhập số người, tiền hụi, tiền khui → tự động tính lãi lỗ & lãi suất",settings:"Cài đặt",members:"Số thành viên (gồm chủ hụi)",membersNote:"Tối thiểu 3, không giới hạn",monthlyFee:"Tiền hụi / người / tháng",bidsTitle:"Tiền khui mỗi kỳ",bidsNote:"Kỳ 1 (chủ hụi) và kỳ cuối = 0",period:"Kỳ",host:"Chủ hụi",resultsTitle:"Bảng lãi lỗ",colMember:"TV",colPeriod:"Kỳ khui",colReceived:"Nhận",colPaid:"Tổng đóng",colNet:"Lãi/Lỗ",colMonthly:"Lãi tháng",colAnnual:"Lãi năm",tapHint:"👆 Nhấn hàng để xem chi tiết",cfTitle:"Dòng tiền",cfNote:"(+) thu, (−) chi",totalPool:"Tổng/tháng",duration:"Thời gian",months:"tháng",maxBid:"Khui max",avgBid:"Khui TB",explain:"📖 Giải thích",explainText:'Hụi ngoại: sống đóng "hụi−khui", chết đóng đủ. Người khui nhận tất cả. Lãi tháng = IRR. Lãi năm = (1+lãi tháng)¹²−1.',langBtn:"🇹🇼 中文",records:"📋 Lịch sử",noRecords:"Chưa có",save:"💾 Lưu",load:"Tải",del:"Xóa",saveName:"Tên...",saveConfirm:"Lưu",cancel:"Hủy",savedMsg:"✅ Đã lưu!",autoSave:"⟳ Tự động lưu",
tab1:"📊 Tính hụi",tab2:"🎯 Chiến lược",
stratTitle:"🎯 Chiến lược khui",stratDesc:"Tính tiền khui tối ưu, so sánh với DCA 0056",
etfRate:"Lợi nhuận năm 0056 (%)",myPeriod:"Tôi muốn khui kỳ nào",
pastBids:"Tiền khui đã biết",futureAvg:"Khui TB tương lai (ước tính)",futureAvgAuto:"(tự động từ TB quá khứ)",
breakEven:"Khui tối đa",breakEvenDesc:"Vượt quá số này thì chờ kỳ cuối có lợi hơn",
scenA:"Plan A: Khui ngay + đầu tư 0056",scenB:"Plan B: Chờ kỳ cuối",
received:"Nhận được",investGrow:"0056 cuối kỳ",deadFees:"Phí chết (FV)",netA:"Giá trị Plan A",aliveFees:"Phí sống (FV)",interestSaved:"Lãi tích lũy (FV)",finalPot:"Nhận cuối",netB:"Giá trị Plan B",diff:"Chênh lệch",
verdictWin:"✅ Khui ngay có lợi hơn!",verdictLose:"⏳ Chờ cuối có lợi hơn",verdictTip:"Chênh lệch = Plan A − Plan B",
simTitle:"Mô phỏng các mức khui",simBid:"Khui",simNet:"Plan A",simVs:"vs Plan B",simResult:"Kết quả"
}};

var S={lang:'zh',memberCount:5,monthlyFee:10000,bids:[0,2000,1500,1000,0],showDetail:null,showSaveForm:false,savedMsg:false,tab:'calc',etfRate:12,myPeriod:2};

function saveS(){try{localStorage.setItem('hui_state',JSON.stringify({lang:S.lang,memberCount:S.memberCount,monthlyFee:S.monthlyFee,bids:S.bids,etfRate:S.etfRate,myPeriod:S.myPeriod}))}catch(e){}}
function loadS(){try{var s=JSON.parse(localStorage.getItem('hui_state'));if(s){S.lang=s.lang||'zh';S.memberCount=s.memberCount||5;S.monthlyFee=s.monthlyFee||10000;S.bids=s.bids||[0,2000,1500,1000,0];S.etfRate=s.etfRate||12;S.myPeriod=s.myPeriod||2}}catch(e){}}
function getRec(){try{return JSON.parse(localStorage.getItem('hui_records'))||[]}catch(e){return[]}}
function saveRec(n){var r=getRec();r.unshift({id:Date.now(),name:n,date:new Date().toLocaleDateString(),memberCount:S.memberCount,monthlyFee:S.monthlyFee,bids:S.bids.slice()});if(r.length>20)r=r.slice(0,20);try{localStorage.setItem('hui_records',JSON.stringify(r))}catch(e){}}
function delRec(id){var r=getRec().filter(function(x){return x.id!==id});try{localStorage.setItem('hui_records',JSON.stringify(r))}catch(e){}}

function calcIRR(cf){var rate=.05;for(var i=0;i<200;i++){var n=0,d=0;for(var t=0;t<cf.length;t++){var p=Math.pow(1+rate,t);n+=cf[t]/p;d-=t*cf[t]/(p*(1+rate))}if(Math.abs(n)<1e-8)return rate;var nr=rate-n/d;if(!isFinite(nr))return null;rate=nr}return Math.abs(rate)<10?rate:null}
function fmt(v){return v===0?'0':(v<0?'-':'')+Math.abs(v).toLocaleString()}
function fmtR(v){return Math.round(v).toLocaleString()}
function pct(v){return(v===null||!isFinite(v))?'—':(v*100).toFixed(1)+'%'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function compute(){
  var t=LANG[S.lang],n=S.memberCount,fee=S.monthlyFee;
  var ppl=[];for(var i=0;i<n;i++)ppl.push({name:i===0?t.host:String.fromCharCode(64+i),wp:i,cf:new Array(n).fill(0),paid:0,recv:0});
  for(var tp=0;tp<n;tp++){var bid=S.bids[tp]||0;var pot=0;for(var p=0;p<n;p++){if(p===tp)continue;var pay=p<tp?fee:fee-bid;ppl[p].cf[tp]=-pay;ppl[p].paid+=pay;pot+=pay}ppl[tp].cf[tp]=pot;ppl[tp].recv=pot}
  return ppl.map(function(p){var net=p.recv-p.paid;var mr=null,ar=null;if(net!==0){mr=calcIRR(p.cf);if(mr!==null)ar=Math.pow(1+mr,12)-1}return{name:p.name,wp:p.wp,cf:p.cf,paid:p.paid,recv:p.recv,net:net,mr:mr,ar:ar}});
}

function computeStrategy(myBid){
  var N=S.memberCount,F=S.monthlyFee,P=S.myPeriod;
  var r=Math.pow(1+S.etfRate/100,1/12)-1;
  var R=N-P; // remaining months after bidding
  // Known past bids (periods 1..P-1)
  var pastB=[];for(var i=1;i<P;i++)pastB.push(S.bids[i]||0);
  var avgPast=pastB.length>0?pastB.reduce(function(a,b){return a+b},0)/pastB.length:0;
  
  // Scenario A: Bid at period P with bid myBid
  var deadCount=P-1;
  var aliveCount=N-P;
  var received=deadCount*F+aliveCount*(F-myBid);
  
  // FV at period N
  var investFV=received*Math.pow(1+r,R);
  var deadFeesFV=0;
  for(var i=1;i<=R;i++)deadFeesFV+=F*Math.pow(1+r,R-i);
  var netA=investFV-deadFeesFV;
  
  // Scenario B: Wait until period N (last person)
  // Periods P to N-1: pay (F - estimated_bid) as alive
  // estimated_bid for future = avgPast
  var aliveFeesFV=0;
  var savingsFV=0;
  for(var i=0;i<R;i++){
    var compound=Math.pow(1+r,R-i-1);
    aliveFeesFV+=(F-avgPast)*compound;
    savingsFV+=avgPast*compound;
  }
  var finalPot=(N-1)*F;
  var netB=finalPot-aliveFeesFV+savingsFV;
  // Actually: netB should be terminal wealth.
  // Each month you pay (F-avgPast). The savings (avgPast) you invest in 0056.
  // At end you receive finalPot.
  // Terminal wealth = finalPot + savingsFV (0056 from savings) - but the alive fees are real costs paid from your money
  // The alive fees could have been invested too. So:
  // If you had NOT been in the hui: you'd invest F/month for R months in 0056
  //   = F * [(1+r)^R - 1] / r
  // Being in hui (scenario B): you invest avgPast/month for R months, then get finalPot
  //   = savingsFV + finalPot
  // But actually you're paying (F-avgPast) into the hui, so from your F/month budget:
  //   you invest avgPast in 0056, and (F-avgPast) goes to hui
  // Terminal: savingsFV + finalPot
  // Compare Scenario A: invest received in 0056, pay F/month dead fees from budget
  //   From F/month budget: F goes to dead fees, 0 to invest
  //   Terminal: investFV (from lump sum)
  // But wait, in Scenario A, the lump sum already includes money from alive members.
  // The dead fees in Scenario A come from the user's budget. So terminal = investFV, and the user spent F*R on dead fees.
  // In Scenario B, the user spends (F-avgPast)*R on alive fees, and saves avgPast*R. Terminal = savingsFV + finalPot.
  
  // Fair comparison from the same monthly budget F:
  // A: month P: receive lump sum (no payment). Months P+1..N: pay F (dead fee). Invest lump sum.
  //    Terminal = received * (1+r)^R. Budget spent on dead fees: F*R (can't invest)
  //    But month P you also save F (don't pay). So you could invest F extra.
  //    Terminal_A = (received + F) * (1+r)^R   -- Hmm, no. Received already includes what others paid.
  //    Actually at month P: user doesn't pay. So from budget F, user has F extra to invest.
  //    Terminal_A = received * (1+r)^R + F * (1+r)^R - deadFeesFV
  //    = (received + F) * (1+r)^R - F * [(1+r)^R - 1] / r
  //    Hmm that's not right either. Let me think again.
  
  // OK let me track net cash flow per month from user's perspective:
  // Scenario A:
  //   Month P: +received (don't pay, receive pot). Net = +received
  //   Months P+1 to N: -F each. Net = -F
  //   If all surplus invested in 0056:
  //   Terminal = received*(1+r)^R - F*(1+r)^(R-1) - F*(1+r)^(R-2) - ... - F*(1+r)^0
  //            = received*(1+r)^R - F*[(1+r)^R - 1]/r
  
  // Scenario B:
  //   Months P to N-1: -(F-avgPast) each. Net = -(F-avgPast)
  //   Month N: +(N-1)*F. Net = +(N-1)*F
  //   Terminal = -(F-avgPast)*(1+r)^R - (F-avgPast)*(1+r)^(R-1) - ... - (F-avgPast)*(1+r) + (N-1)*F
  //   Wait, need to be careful about timing.
  //   Month P (= month 0 in our local index): pay -(F-avgPast)
  //   Month P+1 (= month 1): pay -(F-avgPast)
  //   ...
  //   Month N-1 (= month R-1): pay -(F-avgPast)
  //   Month N (= month R): receive +(N-1)*F
  //   Terminal at month R:
  //   = -(F-avgPast)*(1+r)^R - (F-avgPast)*(1+r)^(R-1) - ... - (F-avgPast)*(1+r)^1 + (N-1)*F
  //   = -(F-avgPast)*[(1+r)^(R+1)-(1+r)]/r + (N-1)*F
  //   Hmm this assumes payments at start of month. Let me use end-of-month payments for consistency.
  
  // Let me just compute numerically. All cash flows happen at end of month.
  // Month 0 = period P. Terminal = month R = period N.
  
  // Scenario A terminal:
  var tvA = received; // received at month 0
  for(var m=1;m<=R;m++){
    tvA = tvA*(1+r) - F; // invest, then pay dead fee
  }
  
  // Scenario B terminal:
  var tvB = 0;
  for(var m=0;m<R;m++){
    tvB = tvB*(1+r) - (F-avgPast); // invest savings, pay alive fee
  }
  tvB = tvB*(1+r) + (N-1)*F; // last month: receive pot
  // Wait, at month R (period N), user doesn't pay (they're the winner). They receive the pot.
  // Actually month R-1 is the last alive payment. Month R is when they receive.
  // Let me redo:
  // Months 0 to R-1 (periods P to N-1): pay alive fee. R months.
  // Month R (period N): receive pot.
  
  tvB = 0;
  for(var m=0;m<R;m++){
    tvB = (tvB - (F-avgPast))*(1+r); // pay alive fee at start, grows for 1 month
  }
  tvB += (N-1)*F; // receive pot at month R
  
  // Redo tvA similarly:
  // Month 0: receive 'received'. Don't pay.
  // Months 1 to R: pay F (dead fee).
  tvA = received;
  for(var m=1;m<=R;m++){
    tvA = (tvA - F)*(1+r);
    // Hmm wait. At month 0, I have 'received'. I invest it.
    // At month 1: my investment grew: received*(1+r). I pay F. Net = received*(1+r) - F.
    // At month 2: (received*(1+r)-F)*(1+r) - F = received*(1+r)^2 - F*(1+r) - F
    // ...
    // At month R: received*(1+r)^R - F*[(1+r)^R - 1]/r
    // Let me just use the formula:
  }
  tvA = received*Math.pow(1+r,R) - F*(Math.pow(1+r,R)-1)/r;
  
  // For tvB, similarly:
  // Month 0: pay (F-avgPast). Remaining: -(F-avgPast). Invest.
  // Month 1: [-(F-avgPast)]*(1+r) - (F-avgPast)
  // ...
  // Month R-1: accumulated value after R alive payments
  // Month R: add (N-1)*F
  tvB = -(F-avgPast)*(Math.pow(1+r,R)-1)/r + (N-1)*F;
  // Hmm wait. The alive payments are from month 0 to R-1 (R payments).
  // FV at month R of annuity-due (payments at start of month):
  // = -(F-avgPast) * [(1+r)^R - 1] / r * (1+r)
  // Hmm, depends on timing. Let me use annuity-immediate (end of month):
  // Payments at end of months 0..R-1. FV at end of month R:
  // = -(F-avgPast) * {(1+r)^R + (1+r)^(R-1) + ... + (1+r)^1}
  // = -(F-avgPast) * (1+r) * [(1+r)^R - 1] / r
  
  // And receive (N-1)*F at end of month R.
  tvB = -(F-avgPast)*(1+r)*(Math.pow(1+r,R)-1)/r + (N-1)*F;
  
  // For tvA:
  // Receive at end of month 0. FV at end of month R: received * (1+r)^R
  // Pay F at end of months 1..R. FV at end of month R:
  // = F * [(1+r)^(R-1) + ... + 1] = F * [(1+r)^R - 1] / r
  tvA = received*Math.pow(1+r,R) - F*(Math.pow(1+r,R)-1)/r;
  
  var diff = tvA - tvB;
  
  // Break-even bid: find B where tvA = tvB
  // tvA(B) = [(P-1)*F + (N-P)*(F-B)] * (1+r)^R - F*[(1+r)^R-1]/r
  // tvA(B) = [(N-1)*F - (N-P)*B] * (1+r)^R - F*[(1+r)^R-1]/r
  // Set tvA = tvB:
  // [(N-1)*F - (N-P)*B_be] * (1+r)^R - F*[(1+r)^R-1]/r = tvB
  // (N-P)*B_be * (1+r)^R = (N-1)*F*(1+r)^R - F*[(1+r)^R-1]/r - tvB
  // B_be = {(N-1)*F*(1+r)^R - F*[(1+r)^R-1]/r - tvB} / {(N-P)*(1+r)^R}
  var growR = Math.pow(1+r,R);
  var annuityR = (growR-1)/r;
  var bBE = ((N-1)*F*growR - F*annuityR - tvB) / ((N-P)*growR);
  if(bBE<0) bBE=0;
  if(bBE>F) bBE=F;
  
  return {tvA:tvA,tvB:tvB,diff:diff,received:received,investFV:received*growR,deadFeesFV:F*annuityR,breakEven:bBE,avgPast:avgPast,R:R};
}

// Actions
window.toggleLang=function(){S.lang=S.lang==='zh'?'vi':'zh';saveS();render()};
window.setTab=function(t){S.tab=t;render()};
window.setMembers=function(v){var n=Math.max(3,v);S.memberCount=n;var nb=new Array(n).fill(0);for(var i=0;i<Math.min(S.bids.length,n);i++)nb[i]=S.bids[i];nb[0]=0;nb[n-1]=0;S.bids=nb;S.showDetail=null;if(S.myPeriod>=n)S.myPeriod=n-1;saveS();render()};
window.setFee=function(v){S.monthlyFee=Math.max(100,v||0);saveS();render()};
window.setBid=function(i,v){S.bids[i]=Math.max(0,Math.min(S.monthlyFee,v));saveS();render()};
window.toggleDetail=function(i){S.showDetail=S.showDetail===i?null:i;render()};
window.setMyPeriod=function(v){S.myPeriod=Math.max(2,Math.min(S.memberCount-1,v));saveS();render()};
window.setEtfRate=function(v){S.etfRate=Math.max(0,Math.min(100,v||0));saveS();render()};
window.showSave=function(){S.showSaveForm=true;render();var e=document.getElementById('saveName');if(e)e.focus()};
window.doSave=function(){var e=document.getElementById('saveName');var n=e?e.value.trim():'';if(!n)return;saveRec(n);S.showSaveForm=false;S.savedMsg=true;render();setTimeout(function(){S.savedMsg=false;render()},2000)};
window.cancelSave=function(){S.showSaveForm=false;render()};
window.doLoad=function(id){var r=getRec().find(function(x){return x.id===id});if(r){S.memberCount=r.memberCount;S.monthlyFee=r.monthlyFee;S.bids=r.bids.slice();S.showDetail=null}saveS();render()};
window.doDelete=function(id){delRec(id);render()};

function render(){
  var t=LANG[S.lang];var results=compute();var records=getRec();var h='';
  
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div class="hint">'+t.autoSave+'</div>';
  h+='<button class="lang-btn" onclick="toggleLang()">'+t.langBtn+'</button></div>';
  h+='<div style="text-align:center;margin-bottom:16px">';
  h+='<div class="mono" style="font-size:11px;color:var(--ac);letter-spacing:3px;margin-bottom:6px">ROSCA / HỤI CALCULATOR</div>';
  h+='<h1 style="font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px">'+t.title+'</h1>';
  h+='<p style="color:var(--tx2);font-size:12px;line-height:1.5">'+t.subtitle+'</p></div>';
  
  // Tabs
  h+='<div class="tab-bar">';
  h+='<button class="tab-btn'+(S.tab==='calc'?' active':'')+'" onclick="setTab(\'calc\')">'+t.tab1+'</button>';
  h+='<button class="tab-btn'+(S.tab==='strat'?' active':'')+'" onclick="setTab(\'strat\')">'+t.tab2+'</button></div>';
  
  // === SETTINGS (always visible) ===
  h+='<div class="card"><div class="stitle">'+t.settings+'</div>';
  h+='<div style="margin-bottom:18px"><div class="label">'+t.members+'</div><div class="hint">'+t.membersNote+'</div>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-top:8px">';
  h+='<button class="tapbtn" onclick="setMembers(S.memberCount-1)">−</button>';
  h+='<input type="number" inputmode="numeric" class="numinput" style="width:80px" value="'+S.memberCount+'" onchange="setMembers(Number(this.value)||3)">';
  h+='<button class="tapbtn" onclick="setMembers(S.memberCount+1)">+</button></div></div>';
  h+='<div><div class="label">'+t.monthlyFee+'</div><div style="margin-top:6px"><input type="number" inputmode="numeric" class="numinput" style="text-align:left" value="'+S.monthlyFee+'" onchange="setFee(Number(this.value))"></div></div></div>';
  
  // Bids
  h+='<div class="card"><div class="stitle">'+t.bidsTitle+'</div><div class="hint" style="margin-bottom:14px">'+t.bidsNote+'</div><div class="bid-grid">';
  for(var i=0;i<S.bids.length;i++){var dis=i===0||i===S.memberCount-1;
    h+='<div><div class="bid-label" style="color:'+(dis?'var(--tx2)':'var(--tx)')+'">'+t.period+' '+(i+1)+' '+(i===0?'('+t.host+')':'('+String.fromCharCode(64+i)+')')+'</div>';
    h+='<input type="number" inputmode="numeric" class="numinput sm" value="'+S.bids[i]+'"'+(dis?' disabled':'')+' onchange="setBid('+i+',Number(this.value)||0)"></div>'}
  h+='</div></div>';
  
  if(S.tab==='calc'){
    // === CALC TAB ===
    // Chips
    h+='<div class="grid2">';
    h+='<div class="chip"><div class="cl">'+t.totalPool+'</div><div class="cv" style="color:var(--blu)">'+fmt(S.monthlyFee*S.memberCount)+'</div></div>';
    h+='<div class="chip"><div class="cl">'+t.duration+'</div><div class="cv" style="color:var(--ac)">'+S.memberCount+' '+t.months+'</div></div>';
    h+='<div class="chip"><div class="cl">'+t.maxBid+'</div><div class="cv" style="color:var(--red)">'+fmt(Math.max.apply(null,S.bids))+'</div></div>';
    var avg=Math.round(S.bids.reduce(function(a,b){return a+b},0)/S.memberCount);
    h+='<div class="chip"><div class="cl">'+t.avgBid+'</div><div class="cv" style="color:var(--grn)">'+fmt(avg)+'</div></div></div>';
    
    // Results table
    h+='<div class="card"><div class="stitle">'+t.resultsTitle+'</div><div class="tbl-wrap"><table><thead><tr>';
    [t.colMember,t.colPeriod,t.colReceived,t.colPaid,t.colNet,t.colMonthly,t.colAnnual].forEach(function(c,i){h+='<th'+(i===0?' style="text-align:left"':'')+'>'+c+'</th>'});
    h+='</tr></thead><tbody>';
    results.forEach(function(r,i){var nc=r.net>0?'var(--grn)':r.net<0?'var(--red)':'var(--tx2)';var ac=r.ar>0?'var(--grn)':r.ar<0?'var(--red)':'var(--tx2)';
      h+='<tr class="'+(S.showDetail===i?'active':'')+'" onclick="toggleDetail('+i+')"><td style="color:'+(i===0?'var(--ac)':'var(--tx)')+'">'+r.name+'</td><td>'+t.period+' '+(r.wp+1)+'</td><td style="color:var(--blu)">'+fmt(r.recv)+'</td><td>'+fmt(r.paid)+'</td><td style="font-weight:700;color:'+nc+'">'+(r.net>0?'+':'')+fmt(r.net)+'</td><td style="font-size:11px;color:var(--tx2)">'+pct(r.mr)+'</td><td style="font-size:11px;color:'+ac+'">'+pct(r.ar)+'</td></tr>'});
    h+='</tbody></table></div><div class="hint" style="margin-top:10px">'+t.tapHint+'</div></div>';
    
    // Cash flow detail
    if(S.showDetail!==null&&S.showDetail<results.length){var dr=results[S.showDetail];
      h+='<div class="card accent"><div class="stitle">'+dr.name+' — '+t.cfTitle+'</div><div class="hint" style="margin-bottom:14px">'+t.cfNote+'</div><div class="cf-wrap">';
      var mx=1;dr.cf.forEach(function(c){var a=Math.abs(c);if(a>mx)mx=a});
      dr.cf.forEach(function(cf,tp){var bH=Math.round(Math.abs(cf)/mx*56);var w=cf>0;
        h+='<div class="cf-bar-col"><div class="cf-val" style="color:'+(w?'var(--grn)':'var(--red)')+'">'+(cf>0?'+':'')+fmt(cf)+'</div><div class="cf-bar" style="height:'+bH+'px;background:linear-gradient(180deg,'+(w?'var(--grn),#059669':'var(--red),#b91c1c')+');opacity:'+(cf===0?.15:.8)+'"></div><div class="cf-period">'+(tp+1)+'</div></div>'});
      h+='</div></div>'}
    
    // Records
    h+='<div class="card"><div class="stitle">'+t.records+'</div>';
    if(S.savedMsg)h+='<div style="text-align:center;padding:12px;color:var(--grn);font-weight:700">'+t.savedMsg+'</div>';
    if(S.showSaveForm){h+='<input type="text" id="saveName" class="name-input" placeholder="'+esc(t.saveName)+'" onkeydown="if(event.key===\'Enter\')doSave()"><div style="display:flex;gap:8px"><button class="save-btn green" onclick="doSave()" style="flex:1">'+t.saveConfirm+'</button><button class="save-btn" onclick="cancelSave()" style="flex:1">'+t.cancel+'</button></div>'}
    else{h+='<button class="save-btn green" onclick="showSave()">'+t.save+'</button>'}
    if(records.length>0){h+='<div style="margin-top:14px">';records.forEach(function(rec){
      h+='<div class="record-item"><div class="record-name">'+esc(rec.name)+'</div><div class="record-info">'+rec.memberCount+'人 · '+fmt(rec.monthlyFee)+'/'+t.months+' · '+rec.date+'</div><div class="record-actions"><button onclick="doLoad('+rec.id+')">'+t.load+'</button><button class="del" onclick="doDelete('+rec.id+')">'+t.del+'</button></div></div>'});h+='</div>'}
    else h+='<div style="text-align:center;padding:16px 0;color:var(--tx2);font-size:13px">'+t.noRecords+'</div>';
    h+='</div>';
    
  } else {
    // === STRATEGY TAB ===
    h+='<div class="card strategy"><div class="stitle pur">'+t.stratTitle+'</div>';
    h+='<div class="hint" style="margin-bottom:16px">'+t.stratDesc+'</div>';
    
    // ETF rate
    h+='<div style="margin-bottom:16px"><div class="label">'+t.etfRate+'</div>';
    h+='<input type="number" inputmode="decimal" class="numinput" style="width:120px;margin-top:6px" value="'+S.etfRate+'" onchange="setEtfRate(Number(this.value))"></div>';
    
    // My period
    h+='<div style="margin-bottom:16px"><div class="label">'+t.myPeriod+'</div>';
    h+='<select class="strat-select" style="margin-top:6px" onchange="setMyPeriod(Number(this.value))">';
    for(var i=2;i<S.memberCount;i++){h+='<option value="'+i+'"'+(S.myPeriod===i?' selected':'')+'>'+t.period+' '+i+' ('+String.fromCharCode(63+i)+')</option>'}
    h+='</select></div>';
    
    var strat=computeStrategy(0); // compute with bid=0 first for break-even
    
    // Break-even result
    h+='<div style="background:var(--s2);border-radius:12px;padding:16px;margin-bottom:16px">';
    h+='<div style="font-size:12px;color:var(--tx2);margin-bottom:6px">'+t.breakEven+'</div>';
    h+='<div class="mono" style="font-size:32px;font-weight:900;color:var(--pur)">'+fmtR(strat.breakEven)+'</div>';
    h+='<div class="hint" style="margin-top:4px">'+t.breakEvenDesc+'</div>';
    h+='<div class="hint" style="margin-top:8px">'+t.futureAvg+': '+fmtR(strat.avgPast)+' '+t.futureAvgAuto+'</div>';
    h+='</div>';
    
    // Simulation table: different bid amounts
    h+='<div class="stitle pur" style="margin-top:8px">'+t.simTitle+'</div>';
    var simBids=[0];
    var step=Math.max(100,Math.round(strat.breakEven/5/100)*100);
    for(var b=step;b<=S.monthlyFee&&simBids.length<8;b+=step)simBids.push(b);
    if(strat.breakEven>0&&strat.breakEven<S.monthlyFee){
      // insert break-even into list
      var beRound=Math.round(strat.breakEven);
      if(simBids.indexOf(beRound)===-1)simBids.push(beRound);
      simBids.sort(function(a,b){return a-b});
    }
    
    h+='<div style="overflow-x:auto;margin:0 -12px;padding:0 12px"><table style="min-width:400px"><thead><tr>';
    h+='<th style="text-align:left">'+t.simBid+'</th><th>'+t.received+'</th><th>'+t.simNet+'</th><th>'+t.simVs+'</th><th>'+t.simResult+'</th></tr></thead><tbody>';
    
    simBids.forEach(function(bid){
      var s=computeStrategy(bid);
      var isBE=Math.abs(bid-Math.round(strat.breakEven))<1;
      var win=s.diff>=0;
      h+='<tr style="'+(isBE?'background:rgba(167,139,250,.1)':'')+'">';
      h+='<td style="text-align:left;font-weight:700;'+(isBE?'color:var(--pur)':'')+'" class="mono">'+fmt(bid)+(isBE?' ★':'')+'</td>';
      h+='<td class="mono">'+fmtR(s.received)+'</td>';
      h+='<td class="mono">'+fmtR(s.tvA)+'</td>';
      h+='<td class="mono" style="color:'+(s.diff>=0?'var(--grn)':'var(--red)');
      h+='">'+(s.diff>=0?'+':'')+fmtR(s.diff)+'</td>';
      h+='<td style="color:'+(win?'var(--grn)':'var(--red)')+';font-weight:700">'+(win?'✅':'❌')+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div class="hint" style="margin-top:8px">★ = '+t.breakEven+' · ✅ = '+t.verdictWin.replace('✅ ','')+' · ❌ = '+t.verdictLose.replace('⏳ ','')+'</div>';
    
    // Detailed comparison for break-even bid
    var sDetail=computeStrategy(Math.round(strat.breakEven/2)); // show middle-ground example
    h+='<div style="margin-top:16px"><div class="stitle pur">'+t.simBid+' '+fmtR(Math.round(strat.breakEven/2))+' '+t.period+'</div>';
    h+='<div style="margin-bottom:8px;font-size:12px;color:var(--pur);font-weight:700">'+t.scenA+'</div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.received+'</span><span class="compare-val" style="color:var(--blu)">'+fmtR(sDetail.received)+'</span></div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.investGrow+'</span><span class="compare-val" style="color:var(--grn)">'+fmtR(sDetail.investFV)+'</span></div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.deadFees+'</span><span class="compare-val" style="color:var(--red)">−'+fmtR(sDetail.deadFeesFV)+'</span></div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.netA+'</span><span class="compare-val" style="color:var(--ac);font-size:16px">'+fmtR(sDetail.tvA)+'</span></div>';
    
    h+='<div style="margin:12px 0 8px;font-size:12px;color:var(--pur);font-weight:700">'+t.scenB+'</div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.finalPot+'</span><span class="compare-val" style="color:var(--blu)">'+fmtR((S.memberCount-1)*S.monthlyFee)+'</span></div>';
    h+='<div class="compare-row"><span class="compare-label">'+t.netB+'</span><span class="compare-val" style="color:var(--ac);font-size:16px">'+fmtR(sDetail.tvB)+'</span></div>';
    
    var dWin=sDetail.diff>=0;
    h+='<div class="verdict-box '+(dWin?'win':'lose')+'">';
    h+='<div class="vt" style="color:'+(dWin?'var(--grn)':'var(--red)');
    h+='">'+(dWin?t.verdictWin:t.verdictLose)+'</div>';
    h+='<div class="vs">'+t.diff+': <span class="mono" style="color:'+(dWin?'var(--grn)':'var(--red)');
    h+='">'+(sDetail.diff>=0?'+':'')+fmtR(sDetail.diff)+'</span></div></div>';
    h+='</div>';
    
    h+='</div>'; // end strategy card
  }
  
  // Explanation
  h+='<div class="explain"><strong>'+t.explain+'</strong><br>'+t.explainText+'</div>';
  
  document.getElementById('app').innerHTML=h;
}

loadS();render();
</script>
